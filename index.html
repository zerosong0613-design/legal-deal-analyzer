<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>거래구조 분석기 - Legal Intake Assistant</title>

<style>
body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f6f8;
margin:0;
}

header{
background:#1b2238;
color:white;
padding:20px 40px;
font-size:20px;
font-weight:600;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

textarea{
width:100%;
height:120px;
border-radius:8px;
border:1px solid #ddd;
padding:12px;
font-size:14px;
}

button{
background:#1b2238;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.result{
white-space:pre-line;
line-height:1.7;
}

.step{
font-size:14px;
color:#888;
margin-bottom:8px;
}

.notice{
background:#fff4dc;
padding:12px;
border-radius:6px;
font-size:13px;
}
</style>
</head>

<body>

<header>
거래구조 분석기 | Legal Intake Assistant
</header>

<div class="container">

<div class="card notice">
이 도구는 현업 담당자가 법무 검토 요청 전에 거래 구조를 정리하도록 돕는 AI 도구입니다.  
최종 법률 판단 및 계약서 검토는 반드시 법무팀과 협의해 주세요.
</div>

<div class="card">
<div class="step">① 거래 설명 입력</div>

<textarea id="input"
placeholder="예: 협력사와 공동으로 기술 개발을 논의 중입니다. 개발 결과는 양사가 공동 활용할 예정입니다."></textarea>

<button onclick="analyze()">분석 시작</button>
</div>

<div class="card result" id="result"></div>

</div>

<script>

function today(){
const d=new Date()
return d.getFullYear()+"년 "+(d.getMonth()+1)+"월 "+d.getDate()+"일"
}

function analyze(){

const text=document.getElementById("input").value

if(!text){
alert("거래 내용을 입력해주세요")
return
}

let type="기타 계약"

if(text.includes("비밀")||text.includes("NDA")) type="비밀유지계약(NDA)"
else if(text.includes("공동")||text.includes("개발")) type="공동개발계약"
else if(text.includes("용역")||text.includes("서비스")) type="용역계약"
else if(text.includes("공급")||text.includes("납품")) type="공급계약"
else if(text.includes("라이선스")) type="라이선스 계약"

let issue=""

if(type==="비밀유지계약(NDA)"){
issue=
`
추가 확인이 필요한 쟁점

1. 비밀정보 정의 범위 (기술정보 / 영업정보 / 고객정보)
2. 비밀정보 제공 방식 (일방 제공 / 상호 제공)
3. 비밀유지 기간
4. 제3자 공유 허용 여부 (계열사 / 자문사)
5. 역설계 금지 여부
`
}

else if(type==="공동개발계약"){
issue=
`
추가 확인이 필요한 쟁점

1. 공동개발 결과물의 지식재산권 귀속
2. 개발 비용 분담
3. 기존 기술과 개발성과 구분
4. 특허 출원 주체
5. 개발 중단 시 성과 처리
`
}

else if(type==="용역계약"){
issue=
`
추가 확인이 필요한 쟁점

1. 업무 범위 정의
2. 산출물 존재 여부
3. 검수 기준
4. 지식재산권 귀속
5. 재위탁 허용 여부
`
}

else if(type==="공급계약"){
issue=
`
추가 확인이 필요한 쟁점

1. 공급 대상 제품
2. 납기 및 검수 기준
3. 대금 지급 조건
4. 하자 책임
5. 지체상금 여부
`
}

else{
issue=
`
추가 확인이 필요한 쟁점

1. 당사자 역할 (누가 무엇을 제공하는지)
2. 교환 구조 (대금 / 기술 / 데이터 등)
3. 결과물 존재 여부
4. 지식재산권 귀속
5. 책임 및 손해배상 구조
`
}

const result=`

② 거래 구조 분석

입력 내용
${text}

추정 계약 유형
${type}

③ 추가 확인 필요 쟁점
${issue}

④ 법무 검토 요청서

요청일: ${today()}

1. 계약 유형
${type}

2. 거래 목적 및 배경
${text}

3. 거래 구조 요약
(추후 상세 내용 확인 필요)

4. 주요 검토 쟁점
${issue}

5. 법무팀 검토 요청 사항
- 계약 구조 검토
- 주요 리스크 확인
- 필요 시 표준 계약서 제안
`

document.getElementById("result").innerText=result

}

</script>

</body>
</html>
